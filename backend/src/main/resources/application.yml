server:
  port: 8080

spring:
  application:
    name: quickcylinder

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/quickcylinder}
    username: ${DB_USER:quickcylinder}
    password: ${DB_PASSWORD:QuickCyl2025!}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: QuickCylinderSecretKeyForJWT2025ProductionGradeApplicationDoNotShareThisKey12345
    expiration-ms: 86400000  # 24 hours