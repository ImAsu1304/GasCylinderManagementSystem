server:
  port: 8080

spring:
  application:
    name: quickcylinder

  datasource:
    url: jdbc:mariadb://localhost:3306/quickcylinder
    username: quickcylinder
    password: QuickCyl2025!
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: QuickCylinderSecretKeyForJWT2025ProductionGradeApplicationDoNotShareThisKey12345
    expiration-ms: 86400000  # 24 hours
